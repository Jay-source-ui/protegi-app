name: protegi
description: A Flutter application for MobSF security scanning and vulnerability reporting.
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  file_picker: ^8.1.2
  percent_indicator: ^4.2.3
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  intl: ^0.19.0
  device_info_plus: ^12.3.0
  permission_handler: ^12.0.1
  battery_plus: ^7.0.0
  network_info_plus: ^7.0.0
  syncfusion_flutter_gauges: ^32.2.8
  safe_device: ^1.1.4
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  provider: ^6.1.2
  animate_do: ^3.3.4
  lottie: ^3.1.2
  dart_openai: ^5.1.0
  flutter_spinkit: ^5.2.1
  firebase_data_connect: ^0.1.1
  device_apps: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
